<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenMind Gateway Setup</title>
    <script src="/tailwind.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo / Header -->
        <div class="text-center mb-8 fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl shadow-lg mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">GreenMind Gateway</h1>
            <p class="text-sm text-gray-500 mt-1">Ersteinrichtung · Setup</p>
        </div>

        <!-- Setup Form Card -->
        <div id="form-card" class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-gray-100 p-8 fade-in">
            <form id="setup-form" method="post" action="/setup" class="space-y-5">
                <div>
                    <label for="ssid" class="block text-sm font-medium text-gray-700 mb-1">WLAN-Netzwerk (SSID)</label>
                    <input type="text" id="ssid" name="ssid" required
                           placeholder="z.B. MeinGewächshaus"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all text-base outline-none">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">WLAN-Passwort</label>
                    <input type="password" id="password" name="password"
                           placeholder="Leer lassen für offene Netzwerke"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all text-base outline-none">
                </div>

                <div>
                    <label for="pairing_code" class="block text-sm font-medium text-gray-700 mb-1">Pairing-Code</label>
                    <input type="text" id="pairing_code" name="pairing_code" required
                           placeholder="6-stellig aus dem Dashboard"
                           maxlength="8"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all text-base outline-none font-mono tracking-widest text-center text-lg uppercase">
                </div>

                <div>
                    <label for="gateway_name" class="block text-sm font-medium text-gray-700 mb-1">Gateway-Name <span class="text-gray-400">(optional)</span></label>
                    <input type="text" id="gateway_name" name="gateway_name"
                           placeholder="z.B. Gewächshaus Nord"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all text-base outline-none">
                </div>

                <input type="hidden" name="server_url" value="{{ server_url }}">

                <button type="submit" id="submit-btn"
                        class="w-full py-3.5 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold rounded-xl shadow-md hover:shadow-lg hover:from-green-600 hover:to-emerald-700 active:scale-[0.98] transition-all text-base">
                    Verbinden
                </button>
            </form>
        </div>

        <!-- Loading State -->
        <div id="loading-card" class="hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-gray-100 p-8 text-center fade-in">
            <div class="inline-flex items-center justify-center w-12 h-12 mb-4">
                <svg class="w-12 h-12 text-green-500 spinner" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
            </div>
            <h2 class="text-lg font-semibold text-gray-900">Verbindung wird hergestellt…</h2>
            <p id="loading-status" class="text-sm text-gray-500 mt-2">WLAN-Verbindung testen</p>
        </div>

        <!-- Success State -->
        <div id="success-card" class="hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-green-200 p-8 text-center fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 class="text-lg font-semibold text-green-900">Einrichtung Abgeschlossen!</h2>
            <p class="text-sm text-gray-500 mt-2">Das Gateway startet jetzt neu. Sie können dieses Fenster schliessen.</p>
        </div>

        <!-- Error State -->
        <div id="error-card" class="hidden bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl border border-red-200 p-8 text-center fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-4">
                <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </div>
            <h2 class="text-lg font-semibold text-red-900">Einrichtung Fehlgeschlagen</h2>
            <p id="error-message" class="text-sm text-gray-500 mt-2">Prüfen Sie WLAN-Daten und Pairing-Code.</p>
            <button onclick="location.reload()"
                    class="mt-4 px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-xl transition-all text-sm">
                Erneut versuchen
            </button>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">GreenMind IoT Platform · v1.0</p>
    </div>

    <script>
        const form = document.getElementById('setup-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formCard = document.getElementById('form-card');
            const loadingCard = document.getElementById('loading-card');
            const successCard = document.getElementById('success-card');
            const errorCard = document.getElementById('error-card');
            const loadingStatus = document.getElementById('loading-status');

            formCard.classList.add('hidden');
            loadingCard.classList.remove('hidden');

            const formData = new FormData(form);

            try {
                loadingStatus.textContent = 'WLAN-Verbindung wird getestet…';
                const resp = await fetch('/setup', {
                    method: 'POST',
                    body: formData,
                });

                const result = await resp.json();

                if (result.status === 'success') {
                    loadingCard.classList.add('hidden');
                    successCard.classList.remove('hidden');
                } else {
                    loadingCard.classList.add('hidden');
                    errorCard.classList.remove('hidden');
                    document.getElementById('error-message').textContent =
                        result.detail || 'Verbindung fehlgeschlagen. Prüfen Sie die Eingaben.';
                }
            } catch (err) {
                loadingCard.classList.add('hidden');
                errorCard.classList.remove('hidden');
                document.getElementById('error-message').textContent =
                    'Netzwerkfehler. Das Gateway ist möglicherweise nicht mehr erreichbar.';
            }
        });
    </script>
</body>
</html>
